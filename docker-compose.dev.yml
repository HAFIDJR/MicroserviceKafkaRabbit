services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  broker:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  orderapi:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    depends_on:
      - broker
      - rabbitmq
    ports:
      - "5001:8080"
    volumes:
      - .:/app
      - /app/OrderApi/bin
      - /app/OrderApi/obj
      - /app/Shared/bin
      - /app/Shared/obj
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      Kafka__BootstrapServers: broker:9092
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    command: >
      sh -c "dotnet restore OrderApi/OrderApi.csproj &&
             dotnet watch --no-hot-reload run --project OrderApi/OrderApi.csproj --urls=http://0.0.0.0:8080"

  productapi:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    depends_on:
      - broker
      - rabbitmq
    ports:
      - "5002:8080"
    volumes:
      - .:/app
      - /app/ProductApi/bin
      - /app/ProductApi/obj
      - /app/Shared/bin
      - /app/Shared/obj
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      Kafka__BootstrapServers: broker:9092
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    command: >
      sh -c "dotnet restore ProductApi/ProductApi.csproj &&
             dotnet watch --no-hot-reload run --project ProductApi/ProductApi.csproj --urls=http://0.0.0.0:8080"